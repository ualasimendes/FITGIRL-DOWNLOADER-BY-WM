appId: com.fitgirl.extractor
productName: FitGirl Desktop Extractor
directories:
  output: dist-desktop
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
  - build/icon.png
  - package.json
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: "FitGirl Desktop Extractor"
  runAfterFinish: true
  perMachine: true
  artifactName: "FitGirl-Desktop-Extractor-Setup-${version}.${ext}"
portable:
  artifactName: "FitGirl-Desktop-Extractor-Portable-${version}.${ext}"
publish:
  provider: github
  owner: ualasimendes
  repo: FITGIRL-DOWNLOADER-BY-WM

name: Release

on:
  push:
    tags:
      - 'v*' # Trigger on any version tag, e.g. v1.0.0, v1.1.2

permissions:
  contents: write # Required to create and publish GitHub Releases

jobs:
  build-and-release:
    name: Build & Publish Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Compile & Package Desktop App
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always
